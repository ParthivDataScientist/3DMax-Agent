<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3DMax Agent — OBJ Fabrication Pipeline</title>
  <meta name="description" content="Upload an OBJ file and download a complete fabrication package as a ZIP." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }
    .logo-icon {
      font-size: 1.4rem;
    }
    .logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo-text span { color: #818cf8; }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }
    .sub {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 1.75rem;
    }

    label.field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    select:focus { border-color: #818cf8; }

    .dropzone {
      border: 2px dashed #2d3148;
      border-radius: 10px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.25rem;
      position: relative;
    }
    .dropzone:hover, .dropzone.over { border-color: #818cf8; background: #1e2035; }
    .dropzone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .dz-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .dz-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; }
    .dz-hint { font-size: 0.78rem; color: #475569; }
    .dz-hint span { color: #818cf8; }
    .dz-selected { color: #4ade80; font-size: 0.9rem; font-weight: 600; }
    .dz-selected small { display: block; color: #64748b; font-weight: 400; font-size: 0.78rem; }

    button#processBtn {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button#processBtn:hover:not(:disabled) { background: #4338ca; }
    button#processBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    button#processBtn.loading .spinner { display: block; }
    button#processBtn.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #statusMsg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2rem;
    }
    .status-error { color: #f87171; }
    .status-ok    { color: #4ade80; }
    .status-info  { color: #94a3b8; }

    .divider {
      border: none;
      border-top: 1px solid #2d3148;
      margin: 1.5rem 0;
    }

    #resultPanel {
      display: none;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .result-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 0.75rem;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      margin-bottom: 0.35rem;
    }
    .result-row span:first-child { color: #64748b; }
    .result-row span:last-child  { font-weight: 600; }

    button#dlBtn {
      width: 100%;
      margin-top: 1rem;
      background: #166534;
      color: #4ade80;
      border: 1px solid #15803d;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button#dlBtn:hover { background: #14532d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">3DMax <span>Agent</span></span>
    </div>

    <h1>OBJ Fabrication Pipeline</h1>
    <p class="sub">Upload a Wavefront <code>.obj</code> file and download a complete fabrication package (PDF drawings + BOM) as a ZIP.</p>

    <label class="field-label" for="sourceUnit">Source unit</label>
    <select id="sourceUnit">
      <option value="mm">Millimeters (mm)</option>
      <option value="cm">Centimeters (cm)</option>
      <option value="m">Meters (m)</option>
      <option value="in">Inches (in)</option>
    </select>

    <label class="field-label">OBJ File</label>
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".obj" />
      <div id="dzIdle">
        <div class="dz-icon">📂</div>
        <p class="dz-title">Drop <code>.obj</code> here or <span style="color:#818cf8">browse</span></p>
        <p class="dz-hint">Wavefront OBJ files only</p>
      </div>
      <div id="dzReady" style="display:none">
        <div class="dz-icon">✅</div>
        <p class="dz-selected" id="dzFileName">model.obj <small id="dzFileSize"></small></p>
        <p class="dz-hint"><span>Click to change file</span></p>
      </div>
    </div>

    <button id="processBtn" disabled>
      <span class="btn-label">Process &amp; Download ZIP</span>
      <span class="spinner"></span>
    </button>

    <p id="statusMsg" class="status-info"></p>

    <hr class="divider" />

    <div id="resultPanel">
      <p class="result-title">✓ Package Ready</p>
      <div class="result-row"><span>File</span><span id="rFile">—</span></div>
      <div class="result-row"><span>Components</span><span id="rComponents">—</span></div>
      <div class="result-row"><span>Part groups</span><span id="rParts">—</span></div>
      <div class="result-row"><span>ZIP size</span><span id="rSize">—</span></div>
      <button id="dlBtn">↓ Download ZIP</button>
    </div>
  </div>

  <script>
    const fileInput   = document.getElementById("fileInput");
    const dropzone    = document.getElementById("dropzone");
    const dzIdle      = document.getElementById("dzIdle");
    const dzReady     = document.getElementById("dzReady");
    const dzFileName  = document.getElementById("dzFileName");
    const dzFileSize  = document.getElementById("dzFileSize");
    const processBtn  = document.getElementById("processBtn");
    const statusMsg   = document.getElementById("statusMsg");
    const resultPanel = document.getElementById("resultPanel");
    const dlBtn       = document.getElementById("dlBtn");
    const sourceUnit  = document.getElementById("sourceUnit");

    let selectedFile = null;
    let zipBase64    = null;
    let zipFilename  = null;

    function formatBytes(b) {
      if (b < 1024) return b + " B";
      if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
      return (b / 1048576).toFixed(2) + " MB";
    }

    function setFile(file) {
      if (!file || !file.name.toLowerCase().endsWith(".obj")) {
        setStatus("Only .obj files are supported.", "error"); return;
      }
      selectedFile = file;
      dzFileName.childNodes[0].nodeValue = file.name + " ";
      dzFileSize.textContent = formatBytes(file.size);
      dzIdle.style.display  = "none";
      dzReady.style.display = "block";
      processBtn.disabled   = false;
      setStatus("", "");
    }

    function setStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className   = type ? `status-${type}` : "status-info";
    }

    function setLoading(on) {
      processBtn.disabled = on;
      processBtn.classList.toggle("loading", on);
    }

    fileInput.addEventListener("change", () => setFile(fileInput.files[0]));

    dropzone.addEventListener("dragover",  e => { e.preventDefault(); dropzone.classList.add("over"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("over"));
    dropzone.addEventListener("drop", e => {
      e.preventDefault();
      dropzone.classList.remove("over");
      setFile(e.dataTransfer.files[0]);
    });

    processBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      setLoading(true);
      setStatus("Reading file…", "info");
      resultPanel.style.display = "none";
      zipBase64 = null; zipFilename = null;

      try {
        const content = await selectedFile.text();
        setStatus("Processing on server — this may take up to a minute…", "info");

        const res = await fetch("/api/process", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename: selectedFile.name, content, sourceUnit: sourceUnit.value }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || data.detail || "Server error");

        zipBase64   = data.zipBase64;
        zipFilename = data.filename;

        const zipBytes = Math.round(atob(zipBase64).length);
        document.getElementById("rFile").textContent       = zipFilename;
        document.getElementById("rComponents").textContent = data.componentCount ?? "—";
        document.getElementById("rParts").textContent      = data.partGroupCount ?? "—";
        document.getElementById("rSize").textContent       = formatBytes(zipBytes);

        resultPanel.style.display = "block";
        setStatus("Done! Your ZIP is ready.", "ok");

        // Auto-trigger download
        triggerDownload();

      } catch (err) {
        setStatus(err.message, "error");
      } finally {
        setLoading(false);
      }
    });

    function triggerDownload() {
      if (!zipBase64) return;
      const bytes  = atob(zipBase64);
      const buf    = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) buf[i] = bytes.charCodeAt(i);
      const blob   = new Blob([buf], { type: "application/zip" });
      const url    = URL.createObjectURL(blob);
      const a      = document.createElement("a");
      a.href       = url; a.download = zipFilename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    dlBtn.addEventListener("click", triggerDownload);
  </script>
</body>
</html>
