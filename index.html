<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBJ Preview Processor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <p class="eyebrow">OBJ Processor Preview</p>
        <h1>Upload, process, download</h1>
        <p class="subtitle">
          Upload OBJ, backend generates drawings and part files, then returns one zip download.
          Temporary files are deleted after processing.
        </p>

        <label class="unit-row" for="sourceUnit">
          Source Unit
          <select id="sourceUnit">
            <option value="mm">mm</option>
            <option value="cm">cm</option>
            <option value="m">m</option>
          </select>
        </label>

        <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Upload OBJ file">
          <input id="fileInput" type="file" accept=".obj" />
          <p class="dropzone-title">Drop `.obj` file here</p>
          <p class="dropzone-meta">or click <span class="choose">Choose File</span></p>
        </div>

        <p class="file-pill" id="fileMeta">No file selected</p>
        <button id="processBtn" disabled>Process & Download</button>
        <p id="status" class="status"></p>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
