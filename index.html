<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBJ Preview Processor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <p class="eyebrow">Vercel Preview</p>
        <h1>Upload your OBJ file</h1>
        <p class="subtitle">
          Quick upload, quick process, quick download. Simple but cool.
        </p>

        <label for="fileInput" class="dropzone" id="dropzone">
          <input id="fileInput" type="file" accept=".obj" />
          <span class="dropzone-title">Drop .obj here or click to choose</span>
          <span class="dropzone-meta" id="fileMeta">No file selected</span>
        </label>

        <button id="processBtn" disabled>Process & Download</button>
        <p id="status" class="status"></p>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
